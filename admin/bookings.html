<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Bookings - AmusePark</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
<nav class="admin-nav">
  <a class="logo" href="../index.html">Amuse<span>Park</span></a>
  <ul>
    <li><a href="admin-dashboard.html">Dashboard</a></li>
    <li><a href="rides.html">Rides</a></li>
    <li><a href="bookings.html" class="active">Bookings</a></li>
    <li><a href="ticket-types.html">Ticket Types</a></li>
    <li><a href="index.html" onclick="Auth.logout('login.html');return false;" style="color:#dc2626;font-weight:600;">Logout</a></li>

  </ul>
</nav>
<div class="page-header"><h1>Bookings Management</h1><p>View and manage all ticket bookings</p></div>
<div class="container">
  <div class="filter-row">
    <input type="text" id="search" placeholder="🔍 Search bookings..." oninput="render()" />
    <select id="filter-pay" onchange="render()" style="width:180px;">
      <option value="">All Payments</option>
      <option>Pending</option><option>Paid</option><option>Cancelled</option><option>Refunded</option>
    </select>
  </div>
  <div style="overflow-x:auto;background:#fff;border-radius:1rem;box-shadow:0 1px 6px rgba(0,0,0,.06);">
    <table>
      <thead><tr><th>Reference</th><th>Customer</th><th>Ticket</th><th>Visit Date</th><th>Amount</th><th>Payment</th><th>Actions</th></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<!-- QR Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header"><h2>Booking Details</h2><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div id="modal-body"></div>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
let bookings = [];
const payColors = {Paid:'badge-green',Pending:'badge-yellow',Cancelled:'badge-red',Refunded:'badge-blue'};

async function load() { bookings = await http.get('/bookings'); render(); }

function render() {
  const s = document.getElementById('search').value.toLowerCase();
  const fp = document.getElementById('filter-pay').value;
  const filtered = bookings.filter(b => {
    const matchS = b.booking_reference?.toLowerCase().includes(s) || b.customer_name?.toLowerCase().includes(s) || b.customer_email?.toLowerCase().includes(s);
    const matchP = !fp || b.payment_status === fp;
    return matchS && matchP;
  });
  document.getElementById('tbody').innerHTML = filtered.map(b => `
    <tr>
      <td style="font-family:monospace;color:#1d4ed8;font-weight:700;">${b.booking_reference}</td>
      <td><div style="font-weight:600;">${b.customer_name}</div><div style="color:#94a3b8;font-size:.8rem;">${b.customer_email}</div></td>
      <td>${b.ticket_type_name} ×${b.quantity}</td>
      <td>${b.visit_date}</td>
      <td style="font-weight:700;">₱${Number(b.total_amount).toLocaleString()}</td>
      <td><span class="badge ${payColors[b.payment_status]||'badge-gray'}">${b.payment_status}</span></td>
      <td style="display:flex;gap:.35rem;flex-wrap:wrap;">
        <button class="btn btn-outline btn-sm" onclick='viewBooking(${JSON.stringify(b).replace(/'/g,"&#39;")})'>👁</button>
        ${b.payment_status==='Pending' ? `<button class="btn btn-success btn-sm" onclick="markPaid(${b.id})">✓ Paid</button>` : ''}
        ${b.status==='Active' ? `<button class="btn btn-primary btn-sm" onclick="markUsed(${b.id})">📱 Used</button>` : ''}
      </td>
    </tr>
  `).join('') || '<tr><td colspan="7" style="text-align:center;color:#94a3b8;padding:2rem;">No bookings found</td></tr>';
}

async function markPaid(id) { await http.put('/bookings/'+id, {payment_status:'Paid'}); load(); }
async function markUsed(id) { await http.put('/bookings/'+id, {status:'Used'}); load(); }

function viewBooking(b) {
  document.getElementById('modal-body').innerHTML = `
    <div style="text-align:center;margin-bottom:1rem;">
      <div style="color:#64748b;font-size:.9rem;">${b.booking_reference}</div>
      <div style="font-size:1.5rem;font-weight:900;color:#1d4ed8;">₱${Number(b.total_amount).toLocaleString()}</div>
    </div>
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(b.qr_code_data||b.booking_reference)}"
      style="display:block;margin:0 auto 1rem;border-radius:.75rem;border:4px solid #dbeafe;" />
    <div style="font-size:.9rem;">
      ${[['Customer',b.customer_name],['Email',b.customer_email],['Phone',b.customer_phone||'—'],['Ticket',`${b.ticket_type_name} × ${b.quantity}`],['Visit Date',b.visit_date],['Payment',b.payment_status],['Status',b.status]].map(([k,v])=>`<div style="display:flex;justify-content:space-between;padding:.4rem 0;border-bottom:1px solid #f1f5f9;"><span style="color:#64748b;">${k}</span><span style="font-weight:500;">${v}</span></div>`).join('')}
    </div>
    <div style="display:flex;gap:.5rem;margin-top:1rem;">
      ${b.payment_status==='Pending'?`<button class="btn btn-success" onclick="markPaid(${b.id});closeModal();" style="flex:1;">Mark Paid</button>`:''}
      ${b.status==='Active'?`<button class="btn btn-primary" onclick="markUsed(${b.id});closeModal();" style="flex:1;">Mark Used</button>`:''}
    </div>
  `;
  document.getElementById('modal').classList.add('show');
}
function closeModal() { document.getElementById('modal').classList.remove('show'); }
load();
</script>
</body>
</html>
