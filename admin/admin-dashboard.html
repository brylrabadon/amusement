<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard - AmusePark</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
<nav class="admin-nav">
  <a class="logo" href="../index.html">Amuse<span>Park</span></a>
  <ul>
    <li><a href="admin-dashboard.html" class="active">Dashboard</a></li>
    <li><a href="rides.html">Rides</a></li>
    <li><a href="bookings.html">Bookings</a></li>
    <li><a href="ticket-types.html">Ticket Types</a></li>
    <li><a href="#" onclick="Auth.logout('login.html');return false;" style="color:#dc2626;font-weight:600;">Logout</a></li>
  </ul>
</nav>

<div class="page-header">
  <h1 id="admin-welcome">Admin Dashboard</h1>
  <p>AmusePark Management</p>
</div>

<div class="container">
  <div class="stats-grid" id="stats">
    <div class="skeleton" style="height:90px;"></div>
    <div class="skeleton" style="height:90px;"></div>
    <div class="skeleton" style="height:90px;"></div>
    <div class="skeleton" style="height:90px;"></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:1.5rem;">
    <div class="card" style="padding:1.5rem;">
      <h3 style="font-weight:700;margin-bottom:1rem;">Recent Bookings</h3>
      <div id="recent-bookings"></div>
    </div>
    <div class="card" style="padding:1.5rem;">
      <h3 style="font-weight:700;margin-bottom:1rem;">Rides Status</h3>
      <div id="rides-status" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;text-align:center;"></div>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>
const user = Auth.requireAuth('admin');
if (user) {
  document.getElementById('admin-welcome').textContent = 'Admin Dashboard — ' + user.full_name;
}

async function load() {
  const [bookings, rides] = await Promise.all([http.get('/bookings'), http.get('/rides')]);
  const paid = bookings.filter(b => b.payment_status === 'Paid');
  const revenue = paid.reduce((s, b) => s + Number(b.total_amount || 0), 0);
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="stat-label">Total Bookings</div><div class="stat-value">${bookings.length}</div></div>
    <div class="stat-card"><div class="stat-label">Paid Bookings</div><div class="stat-value" style="color:#16a34a;">${paid.length}</div></div>
    <div class="stat-card"><div class="stat-label">Pending</div><div class="stat-value" style="color:#ca8a04;">${bookings.filter(b => b.payment_status === 'Pending').length}</div></div>
    <div class="stat-card"><div class="stat-label">Total Revenue</div><div class="stat-value" style="color:#1d4ed8;">₱${revenue.toLocaleString()}</div></div>
  `;
  document.getElementById('recent-bookings').innerHTML = bookings.slice(0, 5).map(b => `
    <div style="display:flex;justify-content:space-between;padding:.5rem 0;border-bottom:1px solid #f1f5f9;font-size:.9rem;">
      <div>
        <div style="font-weight:600;">${b.customer_name}</div>
        <div style="color:#94a3b8;font-size:.8rem;">${b.booking_reference}</div>
      </div>
      <div style="text-align:right;">
        <div style="font-weight:700;">₱${Number(b.total_amount).toLocaleString()}</div>
        <div style="font-size:.8rem;color:${b.payment_status === 'Paid' ? '#16a34a' : '#ca8a04'};">${b.payment_status}</div>
      </div>
    </div>
  `).join('') || '<p style="color:#94a3b8;text-align:center;">No bookings yet</p>';

  const statuses = ['Open', 'Closed', 'Maintenance'];
  const colors = ['#dcfce7', '#fee2e2', '#fef9c3'];
  const textColors = ['#16a34a', '#dc2626', '#ca8a04'];
  document.getElementById('rides-status').innerHTML = statuses.map((s, i) => `
    <div style="background:${colors[i]};border-radius:.75rem;padding:1rem;">
      <div style="font-size:2rem;font-weight:900;color:${textColors[i]};">${rides.filter(r => r.status === s).length}</div>
      <div style="color:${textColors[i]};font-size:.85rem;font-weight:600;">${s}</div>
    </div>
  `).join('');
}

load();
</script>
</body>
</html>
