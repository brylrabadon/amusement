<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rides - AmusePark</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<nav>
  <a class="logo" href="index.html">Amuse<span>Park</span></a>
  <ul>
    <li><a href="rides.html" class="active">Rides</a></li>
    <li><a href="tickets.html">Buy Tickets</a></li>
    <li><a href="my-bookings.html">My Bookings</a></li>
    <li><a href="index.html" onclick="Auth.logout('login.html');return false;" style="color:#dc2626;font-weight:600;">Logout</a></li>

  </ul>
</nav>

<div class="page-header">
  <h1>Available Rides</h1>
  <p>Discover all our thrilling attractions</p>
</div>

<div class="container">
  <div class="filter-row">
    <input type="text" id="search" placeholder="🔍 Search rides..." oninput="filterRides()" />
  </div>
  <div class="filter-tabs" id="cats">
    <button class="filter-tab active" onclick="setCategory('All',this)">All</button>
    <button class="filter-tab" onclick="setCategory('Thrill',this)">Thrill</button>
    <button class="filter-tab" onclick="setCategory('Family',this)">Family</button>
    <button class="filter-tab" onclick="setCategory('Kids',this)">Kids</button>
    <button class="filter-tab" onclick="setCategory('Water',this)">Water</button>
    <button class="filter-tab" onclick="setCategory('Classic',this)">Classic</button>
  </div>
  <div class="grid grid-3" id="rides-grid">
    <div class="skeleton" style="height:300px;"></div>
    <div class="skeleton" style="height:300px;"></div>
    <div class="skeleton" style="height:300px;"></div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
let allRides = [];
let activeCategory = 'All';
const catColors = {Thrill:'badge-red',Family:'badge-green',Kids:'badge-purple',Water:'badge-blue',Classic:'badge-gray'};
const statusDot = {Open:'#16a34a',Closed:'#dc2626',Maintenance:'#ca8a04'};

async function loadRides() {
  allRides = await http.get('/rides');
  renderRides();
}

function setCategory(cat, el) {
  activeCategory = cat;
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderRides();
}

function filterRides() { renderRides(); }

function renderRides() {
  const search = document.getElementById('search').value.toLowerCase();
  const filtered = allRides.filter(r => {
    const matchS = r.name?.toLowerCase().includes(search) || r.description?.toLowerCase().includes(search);
    const matchC = activeCategory === 'All' || r.category === activeCategory;
    return matchS && matchC;
  });
  const grid = document.getElementById('rides-grid');
  if (!filtered.length) { grid.innerHTML = '<div class="empty"><div class="empty-icon">🎢</div><p>No rides found.</p></div>'; return; }
  grid.innerHTML = filtered.map(r => `
    <div class="card">
      ${r.image_url
        ? `<img src="${r.image_url}" class="card-img" alt="${r.name}" style="display:block;" />`
        : `<div class="card-img">🎢</div>`}
      <div class="card-body">
        <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:.5rem;">
          <h3 class="card-title">${r.name}</h3>
          <span class="badge ${catColors[r.category]||'badge-gray'}">${r.category}</span>
        </div>
        <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;flex-wrap:wrap;">
          <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${statusDot[r.status]||'#ccc'};"></span>
          <span style="font-size:.8rem;color:#64748b;">${r.status}</span>
          ${r.status === 'Maintenance'
            ? '<span class="badge badge-red">Temporarily Closed</span>'
            : ''
          }
          ${r.is_featured ? '<span class="badge badge-yellow" style="background:#fef9c3;color:#ca8a04;">Featured</span>' : ''}
        </div>
        <p class="card-text">${r.description||''}</p>
        <div style="display:flex;justify-content:space-between;align-items:center;font-size:.9rem;color:#94a3b8;margin-bottom:1rem;">
          <div style="display:flex;gap:1rem;flex-wrap:wrap;">
            ${r.duration_minutes ? `<span>⏱ ${r.duration_minutes} min</span>` : ''}
            ${r.min_height_cm ? `<span>📏 ${r.min_height_cm}cm min</span>` : ''}
            ${r.max_capacity ? `<span>👥 ${r.max_capacity} max</span>` : ''}
          </div>
          <div style="font-weight:700;color:#1d4ed8;">₱${Number(r.price||0).toLocaleString()}</div>
        </div>
        <a href__="tickets.html" class="btn btn-primary btn-full" ${r.status!=='Open'?'style="opacity:.5;pointer-events:none;"':''}>
          ${r.status === 'Open' ? 'Book Now' : r.status}
        </a>
      </div>
    </div>
  `).join('');
}

loadRides();
</script>
</body>
</html>
