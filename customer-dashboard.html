<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Dashboard - AmusePark</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<nav>
  <a class="logo" href="index.html">Amuse<span>Park</span></a>
  <ul>
    <li><a href="rides.html">Rides</a></li>
    <li><a href="tickets.html">Buy Tickets</a></li>
    <li><a href="customer-dashboard.html" class="active">My Dashboard</a></li>
    <li><a href="index.html" onclick="Auth.logout('login.html');return false;" style="color:#dc2626;font-weight:600;">Logout</a></li>
  </ul>
</nav>

<div class="page-header">
  <h1 id="welcome-msg">My Dashboard</h1>
  <p>Manage your bookings and profile</p>
</div>

<div class="container">
  <div class="stats-grid" id="cust-stats">
    <div class="skeleton" style="height:90px;"></div>
    <div class="skeleton" style="height:90px;"></div>
    <div class="skeleton" style="height:90px;"></div>
    <div class="skeleton" style="height:90px;"></div>
  </div>

  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
    <h3 style="font-weight:700;">My Bookings</h3>
    <a href="tickets.html" class="btn btn-primary btn-sm">+ Book Tickets</a>
  </div>

  <div class="filter-row">
    <input type="text" id="search" placeholder="🔍 Search by reference..." oninput="render()" />
  </div>

  <div id="my-bookings-list"></div>
</div>

<!-- QR Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h2>Entry QR Code</h2>
      <button class="modal-close" onclick="document.getElementById('modal').classList.remove('show')">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
const user = Auth.requireAuthPublic('customer');
if (user) {
  document.getElementById('welcome-msg').textContent = 'Welcome, ' + user.full_name + '! 👋';
}

const payColors = { Paid:'badge-green', Pending:'badge-yellow', Cancelled:'badge-red', Refunded:'badge-blue' };
const statColors = { Active:'badge-green', Used:'badge-gray', Expired:'badge-red', Cancelled:'badge-red' };
let allBookings = [];

async function load() {
  allBookings = await http.get('/bookings');
  render();
  renderStats();
}

function renderStats() {
  if (!user) return;
  const mine = allBookings.filter(b => b.customer_email === user.email);
  const paid = mine.filter(b => b.payment_status === 'Paid');
  const revenue = paid.reduce((s, b) => s + Number(b.total_amount || 0), 0);
  document.getElementById('cust-stats').innerHTML = `
    <div class="stat-card"><div class="stat-label">Total Bookings</div><div class="stat-value">${mine.length}</div></div>
    <div class="stat-card"><div class="stat-label">Confirmed</div><div class="stat-value" style="color:#16a34a;">${paid.length}</div></div>
    <div class="stat-card"><div class="stat-label">Pending</div><div class="stat-value" style="color:#ca8a04;">${mine.filter(b => b.payment_status === 'Pending').length}</div></div>
    <div class="stat-card"><div class="stat-label">Total Spent</div><div class="stat-value" style="color:#1d4ed8;">₱${revenue.toLocaleString()}</div></div>
  `;
}

function render() {
  if (!user) return;
  const s = document.getElementById('search').value.toLowerCase();
  const mine = allBookings.filter(b => b.customer_email === user.email);
  const filtered = mine.filter(b =>
    b.booking_reference?.toLowerCase().includes(s) ||
    b.ticket_type_name?.toLowerCase().includes(s)
  );
  const list = document.getElementById('my-bookings-list');
  if (!filtered.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">🎟</div><p>No bookings found. <a href__="tickets.html" style="color:#1d4ed8;">Book now!</a></p></div>';
    return;
  }
  list.innerHTML = filtered.map(b => `
    <div class="card" style="padding:1.25rem;margin-bottom:1rem;">
      <div style="display:flex;flex-wrap:wrap;justify-content:space-between;gap:1rem;align-items:center;">
        <div>
          <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.25rem;flex-wrap:wrap;">
            <strong style="color:#1d4ed8;">${b.booking_reference}</strong>
            <span class="badge ${statColors[b.status] || 'badge-gray'}">${b.status}</span>
            <span class="badge ${payColors[b.payment_status] || 'badge-gray'}">${b.payment_status}</span>
          </div>
          <div style="color:#94a3b8;font-size:.85rem;">🎟 ${b.ticket_type_name} × ${b.quantity} &nbsp;|&nbsp; 📅 ${b.visit_date}</div>
        </div>
        <div style="display:flex;align-items:center;gap:1rem;">
          <div style="font-size:1.25rem;font-weight:900;">₱${Number(b.total_amount).toLocaleString()}</div>
          <button class="btn btn-outline btn-sm" onclick='showQR(${JSON.stringify(b).replace(/'/g,"&#39;")})'>📱 QR</button>
        </div>
      </div>
    </div>
  `).join('');
}

function showQR(b) {
  document.getElementById('modal-body').innerHTML = `
    <div style="text-align:center;">
      <div style="color:#64748b;font-size:.9rem;margin-bottom:.25rem;">${b.booking_reference}</div>
      <div style="font-weight:700;font-size:1.1rem;margin-bottom:1rem;">${b.customer_name}</div>
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(b.qr_code_data || b.booking_reference)}"
        style="border-radius:.75rem;border:4px solid #dbeafe;margin-bottom:1rem;" />
      <div style="background:#f8fafc;border-radius:.75rem;padding:1rem;text-align:left;font-size:.9rem;">
        <div style="display:flex;justify-content:space-between;padding:.35rem 0;border-bottom:1px solid #f1f5f9;"><span style="color:#64748b;">Ticket</span><span>${b.ticket_type_name} × ${b.quantity}</span></div>
        <div style="display:flex;justify-content:space-between;padding:.35rem 0;border-bottom:1px solid #f1f5f9;"><span style="color:#64748b;">Visit Date</span><span>${b.visit_date}</span></div>
        <div style="display:flex;justify-content:space-between;padding:.35rem 0;"><span style="color:#64748b;">Total</span><strong>₱${Number(b.total_amount).toLocaleString()}</strong></div>
      </div>
    </div>`;
  document.getElementById('modal').classList.add('show');
}

load();
</script>
</body>
</html>
