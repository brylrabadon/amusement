<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - AmusePark</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav>
  <a class="logo" href="index.html">Amuse<span>Park</span></a>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="contact.html">Contact</a></li>
    <li><a href="login.html" class="btn btn-yellow">Login</a></li>
  </ul>
</nav>

<div class="auth-page">
  <div class="auth-left">
    <img src="https://images.unsplash.com/photo-1563656157432-67560011e209?w=800&q=80" alt="AmusePark" />
    <div class="auth-left-overlay">
      <div class="hero-tag" style="margin-bottom:1.5rem;">⭐ Philippines' #1 Amusement Park</div>
      <h2 style="font-size:2.5rem;font-weight:900;line-height:1.2;margin-bottom:1rem;">
        LOOKING FOR<br/>ADVENTURE?
      </h2>
      <p style="color:rgba(255,255,255,.8);font-size:1rem;">Ride. Laugh. Scream. Repeat.</p>
    </div>
  </div>

  <div class="auth-right">
    <div class="auth-card">
      <div style="text-align:center;margin-bottom:2rem;">
        <a class="logo" href="index.html" style="font-size:1.8rem;">Amuse<span>Park</span></a>
        <h2 style="font-size:1.5rem;font-weight:800;margin-top:1rem;margin-bottom:.25rem;">Welcome Back!</h2>
        <p style="color:#64748b;font-size:.9rem;">Log in to manage your bookings</p>
      </div>

      <div id="auth-error" class="auth-alert auth-alert-error" style="display:none;"></div>
      <div id="auth-success" class="auth-alert auth-alert-success" style="display:none;"></div>

      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="login-email" placeholder="xxxx@email.com" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-password">
            <input type="password" id="login-password" placeholder="Enter your password" required />
            <button type="button" class="toggle-pw" onclick="togglePw('login-password',this)">👁</button>
          </div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;">
          <label style="display:flex;align-items:center;gap:.5rem;font-weight:400;font-size:.85rem;cursor:pointer;">
            <input type="checkbox" id="remember-me" /> Remember me
          </label>
          <a href="#" style="font-size:.85rem;color:#1d4ed8;text-decoration:none;">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="login-btn" style="font-size:1rem;padding:.85rem;">
          Log In
        </button>
      </form>

      <div style="text-align:center;margin-top:1.5rem;font-size:.9rem;color:#64748b;">
        Don't have an account? <a href="register.html" style="color:#1d4ed8;font-weight:600;text-decoration:none;">Sign Up</a>
      </div>
    </div>
  </div>
</div>

<script src="js/auth.js"></script>
<script>
async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  hideAlerts();
  btn.textContent = 'Logging in...'; btn.disabled = true;
  const result = await Auth.login(email, password);
  btn.textContent = 'Log In'; btn.disabled = false;
  if (result.success) {
    showSuccess('Login successful! Redirecting...');
    setTimeout(() => {
      if (result.user.role === 'admin') {
        window.location.href = 'admin/admin-dashboard.html';
      } else {
        window.location.href = 'customer-dashboard.html';
      }
    }, 1000);
  } else {
    showError(result.message || 'Invalid email or password.');
  }
}
function togglePw(id, btn) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}
function showError(msg) { const el = document.getElementById('auth-error'); el.textContent = msg; el.style.display = 'block'; }
function showSuccess(msg) { const el = document.getElementById('auth-success'); el.textContent = msg; el.style.display = 'block'; }
function hideAlerts() { document.getElementById('auth-error').style.display='none'; document.getElementById('auth-success').style.display='none'; }
</script>
</body>
</html>
