<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account - AmusePark</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav>
  <a class="logo" href="index.html">Amuse<span>Park</span></a>

</nav>

<div class="auth-page">
  <div class="auth-left">
    <img src="https://images.unsplash.com/photo-1563656157432-67560011e209?w=800&q=80" alt="AmusePark" />
    <div class="auth-left-overlay">
      <div class="hero-tag" style="margin-bottom:1.5rem;">⭐ Philippines' #1 Amusement Park</div>
      <h2 style="font-size:2.5rem;font-weight:900;line-height:1.2;margin-bottom:1rem;">
        CREATE<br/>ACCOUNT
      </h2>
      <p style="color:rgba(255,255,255,.8);font-size:1rem;">Join thousands of happy visitors!</p>
    </div>
  </div>

  <div class="auth-right">
    <div class="auth-card">
      <div style="text-align:center;margin-bottom:2rem;">
        <a class="logo" href="index.html" style="font-size:1.8rem;">Amuse<span>Park</span></a>
        <h2 style="font-size:1.5rem;font-weight:800;margin-top:1rem;margin-bottom:.25rem;">Create Account</h2>
        <p style="color:#64748b;font-size:.9rem;">Sign up and start booking your adventure!</p>
      </div>

      <div id="auth-error" class="auth-alert auth-alert-error" style="display:none;"></div>
      <div id="auth-success" class="auth-alert auth-alert-success" style="display:none;"></div>

      <form id="register-form" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="reg-name" placeholder="XXX X. XXX" required />
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="reg-email" placeholder="xxxx@email.com" required />
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" id="reg-phone" placeholder="+63 9XX XXX XXXX" />
        </div>
        <div class="form-group">
          <label>Account Type</label>
          <select id="reg-role">
            <option value="customer">Customer</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-password">
            <input type="password" id="reg-password" placeholder="Min. 8 characters" required />
            <button type="button" class="toggle-pw" onclick="togglePw('reg-password',this)">👁</button>
          </div>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <div class="input-password">
            <input type="password" id="reg-confirm" placeholder="Re-enter your password" required />
            <button type="button" class="toggle-pw" onclick="togglePw('reg-confirm',this)">👁</button>
          </div>
        </div>
        <div style="margin-bottom:1.25rem;">
          <label style="display:flex;align-items:flex-start;gap:.5rem;font-weight:400;font-size:.85rem;cursor:pointer;">
            <input type="checkbox" id="agree-terms" required style="margin-top:3px;" />
            I agree to the <a href="#" style="color:#1d4ed8;text-decoration:none;">Terms of Service</a> and <a href="#" style="color:#1d4ed8;text-decoration:none;">Privacy Policy</a>
          </label>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="register-btn" style="font-size:1rem;padding:.85rem;">
          Create Account
        </button>
      </form>

      <div style="text-align:center;margin-top:1.5rem;font-size:.9rem;color:#64748b;">
        Already have an account? <a href="login.html" style="color:#1d4ed8;font-weight:600;text-decoration:none;">Log In</a>
      </div>
    </div>
  </div>
</div>

<script src="js/auth.js"></script>
<script>
async function handleRegister(e) {
  e.preventDefault();
  const btn = document.getElementById('register-btn');
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const phone = document.getElementById('reg-phone').value.trim();
  const role = document.getElementById('reg-role').value;
  const password = document.getElementById('reg-password').value;
  const confirm = document.getElementById('reg-confirm').value;
  hideAlerts();
  if (password.length < 8) { showError('Password must be at least 8 characters.'); return; }
  if (password !== confirm) { showError('Passwords do not match.'); return; }
  btn.textContent = 'Creating account...'; btn.disabled = true;
  const result = await Auth.register({ full_name: name, email, phone, password, role });
  btn.textContent = 'Create Account'; btn.disabled = false;
  if (result.success) {
    showSuccess('Account created! Redirecting...');
    setTimeout(() => {
      if (role === 'admin') {
        window.location.href = 'admin/admin-dashboard.html';
      } else {
        window.location.href = 'customer-dashboard.html';
      }
    }, 1500);
  } else {
    showError(result.message || 'Registration failed. Email may already be in use.');
  }
}
function togglePw(id, btn) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}
function showError(msg) { const el = document.getElementById('auth-error'); el.textContent = msg; el.style.display = 'block'; }
function showSuccess(msg) { const el = document.getElementById('auth-success'); el.textContent = msg; el.style.display = 'block'; }
function hideAlerts() { document.getElementById('auth-error').style.display='none'; document.getElementById('auth-success').style.display='none'; }
</script>
</body>
</html>
